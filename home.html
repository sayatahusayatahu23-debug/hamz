<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacker Loader - Dream World</title>
    <!-- Font Monospace agar terlihat seperti terminal -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           GLOBAL STYLES
           ========================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #050505;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* =========================================
           1. LOADING SCREEN (THEME: HACKER)
           ========================================= */
        #loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex; /* Muncul pertama kali */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s ease;
            font-family: 'Fira Code', monospace; /* Font Coding */
            overflow: hidden;
            padding: 20px; /* Padding agar konten tidak mentok pinggir HP */
        }

        /* Terminal Text */
        .terminal-text {
            color: #0f0; /* Hijau Matrix */
            font-size: 1.2rem;
            margin-bottom: 20px;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
            white-space: nowrap; /* Agar teks satu barus di desktop */
            text-align: center;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2rem;
            background-color: #0f0;
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        /* Hacker Progress Bar */
        .progress-wrapper {
            width: 300px;
            height: 10px;
            border: 1px solid #0f0;
            padding: 1px;
            background: rgba(0, 50, 0, 0.5);
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background-color: #0f0;
            box-shadow: 0 0 10px #0f0;
            transition: width 0.1s linear;
        }

        .percentage-text {
            color: #0f0;
            margin-top: 5px;
            font-size: 0.9rem;
            text-align: right;
            width: 300px;
        }

        /* Floating Programming Icons */
        .code-icon {
            position: absolute;
            opacity: 0.3; 
            filter: grayscale(100%); 
            transition: filter 0.3s;
            pointer-events: none;
            z-index: 1;
        }

        .code-icon:hover {
            filter: grayscale(0%) brightness(1.2);
            opacity: 1;
        }

        /* =========================================
           2. MAIN WEBSITE STYLES (MOTIVASI & BENDERA)
           ========================================= */
        #main-website {
            display: none; /* Disembunyikan awalnya */
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 20px; /* Padding untuk mobile */
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .flag-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .flag-wrapper {
            position: absolute;
            opacity: 0.8;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        .flag-img {
            width: 80px;
            border-radius: 4px;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .content-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 3rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
            max-width: 700px;
            width: 100%; /* Agar responsif */
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            animation: fadeInUp 1s ease-out;
        }

        .content-card h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            line-height: 1.2;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .content-card p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            font-weight: 300;
        }

        .btn-dream {
            padding: 12px 35px;
            background-color: #fff;
            color: #b21f1f;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-dream:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* =========================================
           KEYFRAMES
           ========================================= */
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes float { 0% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-25px) rotate(5deg); } 100% { transform: translateY(0px) rotate(0deg); } }
        
        /* =========================================
           RESPONSIVE DESIGN (MOBILE & DESKTOP)
           ========================================= */
        @media (max-width: 768px) {
            /* Loading Screen Adjustments */
            .terminal-text { 
                font-size: 0.9rem; 
                white-space: normal; /* Izinkan text wrap di HP */
                max-width: 90%;
            }
            .progress-wrapper, .percentage-text { width: 250px; }
            
            /* Main Content Adjustments */
            .content-card { 
                padding: 1.5rem; /* Kurangi padding agar muat */
                width: 90%; /* Lebar maksimal 90% layar */
            }
            .content-card h1 { font-size: 2rem; line-height: 1.3; }
            .content-card p { font-size: 1rem; margin-bottom: 1.5rem; }
            .btn-dream { padding: 10px 25px; font-size: 1rem; width: 100%; } /* Tombol full width di HP */
            
            /* Flag Icon Sizes */
            .flag-img { width: 50px; } /* Bendera lebih kecil di HP */
            .code-icon { max-width: 40px; } /* Icon coding lebih kecil */
        }
    </style>
</head>
<body>

    <!-- BAGIAN 1: LOADING SCREEN (THEME HACKER) -->
    <div id="loader-container">
        <div id="coding-icons-layer"></div>

        <div class="terminal-text">
            <span id="typewriter-text">root@XII.10:~$ initializing_protocol...</span><span class="cursor"></span>
        </div>

        <div class="progress-wrapper">
            <div class="progress-fill" id="hacker-progress"></div>
        </div>
        <div class="percentage-text" id="percentage">0%</div>
    </div>

    <!-- BAGIAN 2: WEBSITE UTAMA -->
    <main id="main-website">
        <div class="flag-container" id="flagContainer"></div>
        
        <div class="content-card">
            <h1>Kejar Mimpi,<br>Lampaui Batas Negara.</h1>
            <p>
                Dunia adalah panggungmu. Dari Jepang hingga Singapura, dari Jerman hingga Kanada.<br>
                Jangan biarkan garis peta membatasi langkahmu menuju kesuksesan.
            </p>
            <a href="https://anotherxii10.vercel.app" class="btn-dream">Masuk Website</a>
        </div>
    </main>

    <script>
        // === KONFIGURASI ===
        const LOADING_DURATION = 15000; // 15 Detik
        const UPDATE_INTERVAL = 50;

        // URL ICON BAHASA PEMROGRAMAN
        const programmingIcons = [
            'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/html5/html5-original.svg',
            'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/css3/css3-original.svg',
            'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/javascript/javascript-original.svg',
            'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/python/python-original.svg',
            'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/java/java-original.svg',
            'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/c/c-original.svg',
            'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/cplusplus/cplusplus-original.svg',
            'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/react/react-original.svg',
            'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/nodejs/nodejs-original.svg',
            'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/php/php-original.svg',
            'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/ruby/ruby-original.svg',
            'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/swift/swift-original.svg',
            'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/go/go-original.svg'
        ];

        // Teks-teks palsu ala hacker
        const hackerTexts = [
            "Decrypting modules...",
            "Accessing mainframe...",
            "Bypassing firewall...",
            "Compiling resources...",
            "Establishing secure connection...",
            "Optimizing algorithms...",
            "System ready."
        ];

        // Data Negara (Mesir diganti menjadi Singapura)
        const countries = [
            { code: 'jp', name: 'Jepang' }, 
            { code: 'de', name: 'Jerman' }, 
            { code: 'id', name: 'Indonesia' }, 
            { code: 'cn', name: 'China' }, 
            { code: 'kr', name: 'Korea Selatan' }, 
            { code: 'au', name: 'Australia' }, 
            { code: 'sg', name: 'Singapura' }, // Mesir (eg) -> Singapura (sg)
            { code: 'ca', name: 'Kanada' } 
        ];

        // DOM Elements
        const loader = document.getElementById('loader-container');
        const hackerProgress = document.getElementById('hacker-progress');
        const percentageText = document.getElementById('percentage');
        const typewriterText = document.getElementById('typewriter-text');
        const iconsLayer = document.getElementById('coding-icons-layer');
        const mainSite = document.getElementById('main-website');
        const flagContainer = document.getElementById('flagContainer');

        // 1. FUNGSI MEMBUAT ICON CODING MELAYANG
        function initCodingIcons() {
            // Kurangi jumlah icon di HP agar tidak berat
            const iconCount = window.innerWidth < 768 ? 15 : 25;

            for (let i = 0; i < iconCount; i++) {
                const iconUrl = programmingIcons[Math.floor(Math.random() * programmingIcons.length)];
                
                const img = document.createElement('img');
                img.src = iconUrl;
                img.className = 'code-icon';
                
                img.style.left = `${Math.random() * 90}%`;
                img.style.top = `${Math.random() * 90}%`;
                
                const size = 30 + Math.random() * 40;
                img.style.width = `${size}px`;

                const duration = 3 + Math.random() * 4; 
                const delay = Math.random() * 2;
                img.style.animation = `float ${duration}s ease-in-out ${delay}s infinite`;

                iconsLayer.appendChild(img);
            }
        }

        // 2. FUNGSI TYPEWRITER (Teks berjalan)
        function startTypewriter() {
            let textIndex = 0;
            setInterval(() => {
                typewriterText.innerText = `root@XII.10:~$ ${hackerTexts[textIndex]}`;
                textIndex++;
                if (textIndex >= hackerTexts.length) textIndex = 0;
            }, 2000); 
        }

        // 3. FUNGSI LOADING UTAMA
        function startLoading() {
            let startTime = Date.now();
            
            const interval = setInterval(() => {
                let elapsedTime = Date.now() - startTime;
                let progress = (elapsedTime / LOADING_DURATION) * 100;

                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    enterMainSite();
                }

                hackerProgress.style.width = `${progress}%`;
                percentageText.innerText = `${Math.floor(progress)}%`;

            }, UPDATE_INTERVAL);
        }

        // 4. FUNGSI MEMBUAT BENDERA (Untuk Website Utama)
        function initFlags() {
            // Kurangi jumlah bendera di HP
            const flagCount = window.innerWidth < 768 ? 20 : 35;

            for (let i = 0; i < flagCount; i++) {
                const randomCountry = countries[Math.floor(Math.random() * countries.length)];
                
                const wrapper = document.createElement('div');
                wrapper.className = 'flag-wrapper';
                wrapper.style.left = `${Math.random() * 100}%`;
                wrapper.style.top = `${Math.random() * 100}%`;
                
                const duration = 3 + Math.random() * 5; 
                wrapper.style.animation = `float ${duration}s ease-in-out ${Math.random() * 5}s infinite`;

                const img = document.createElement('img');
                img.src = `https://flagcdn.com/w160/${randomCountry.code}.png`;
                img.alt = `Bendera ${randomCountry.name}`;
                img.className = 'flag-img';
                img.style.transform = `scale(${0.8 + Math.random() * 0.5})`;

                wrapper.appendChild(img);
                flagContainer.appendChild(wrapper);
            }
        }

        // 5. TRANSISI KE WEBSITE UTAMA
        function enterMainSite() {
            typewriterText.innerText = "root@XII.10:~$ ACCESS GRANTED";
            typewriterText.style.color = "#00ff00"; 
            
            loader.style.opacity = '0';
            
            setTimeout(() => {
                loader.style.display = 'none';
                mainSite.style.display = 'flex';
                initFlags(); 
            }, 1000);
        }

        // INIT
        window.addEventListener('load', () => {
            initCodingIcons();
            startTypewriter();
            startLoading();
        });

    </script>
</body>
</html>
